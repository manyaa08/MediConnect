<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Request Medicine | MediConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="./css/style.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <div class="bg-blobs"></div>
    <div id="navbar"></div>

    <div class="container py-5 mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card border-0 p-4">
                    <div class="card-body">
                        <h3 class="text-center mb-1 fw-bold text-gradient">Request Medicine</h3>
                        <p class="text-center text-muted mb-4 small">Post a new requirement for your NGO network.</p>

                        <form id="requestForm">
                            <div class="form-floating mb-3">
                                <input class="form-control" id="medicine" placeholder="e.g. Amoxicillin 250mg" required>
                                <label for="medicine">Medicine Name</label>
                            </div>
                            
                            <div class="form-floating mb-3">
                                <input type="number" class="form-control" id="quantity" placeholder="Number of units needed" required>
                                <label for="quantity">Required Quantity</label>
                            </div>
                            
                            <div class="form-floating mb-4">
                                <select class="form-select" id="urgency" required>
                                    <option value="" disabled selected>Select Urgency</option>
                                    <option value="Low">Low (Non-Critical)</option>
                                    <option value="Medium">Medium (Moderate)</option>
                                    <option value="High">High (Immediate Need)</option>
                                </select>
                                <label for="urgency">Urgency Level</label>
                            </div>
                            
                            <div class="d-grid gap-2 mt-2">
                                <button class="btn btn-primary py-3">Submit NGO Request</button>
                                <a href="ngo.html" class="btn btn-link text-decoration-none text-muted small mt-2 text-center">Cancel & Back to Dashboard</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/requestMedicine.js"></script>
    <script src="./js/navbar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
