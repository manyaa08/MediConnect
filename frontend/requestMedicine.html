<!DOCTYPE html>
<html>
<head>
<title>Request Medicine</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="./css/style.css" rel="stylesheet">
</head>

<body class="bg-light">
<div id="navbar"></div>

<div class="container mt-5">

<h3>Request Medicine</h3>

<div class="card shadow-sm mt-3">
<div class="card-body">

<form id="requestForm">

<input class="form-control mt-2" id="medicine" placeholder="Medicine Name" required>

<input type="number" class="form-control mt-2" id="quantity" placeholder="Required Quantity" required>

<select class="form-control mt-2" id="urgency" required>
<option value="">Select Urgency</option>
<option value="Low">Low</option>
<option value="Medium">Medium</option>
<option value="High">High</option>
</select>

<button class="btn btn-primary mt-3">Submit Request</button>

<a href="ngo.html" class="btn btn-secondary mt-3">Cancel</a>

</form>

</div>
</div>

</div>

<script src="js/requestMedicine.js"></script>
<script src="./js/navbar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
