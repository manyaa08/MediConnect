<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MediConnect Register</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="./css/style.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
<div class="bg-blobs"></div>

<div class="auth-wrapper">
  <div class="card auth-card">
    <div class="text-center mb-4">
      <h2 class="mb-2 fw-bold text-gradient">Join MediConnect</h2>
      <p class="text-muted">Create your account to start making a difference.</p>
    </div>

    <form id="registerForm">
      <div class="form-floating mb-3">
        <input type="text" id="name" class="form-control" placeholder="Full Name or Organization" required>
        <label for="name">Full Name / Organization</label>
      </div>
      
      <div class="form-floating mb-3">
        <input type="email" id="email" class="form-control" placeholder="user@example.com" required>
        <label for="email">Email Address</label>
      </div>
      
      <div class="form-floating mb-3">
        <input type="text" id="city" class="form-control" placeholder="New York" required>
        <label for="city">City</label>
      </div>
      
      <div class="form-floating mb-3">
        <select id="role" class="form-select" required>
          <option value="" disabled selected>Select your role</option>
          <option value="Donor">Donor (Donate Medicines)</option>
          <option value="NGO">NGO (Request Medicines)</option>
        </select>
        <label for="role">Role</label>
      </div>
      
      <div class="form-floating mb-4">
        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        <label for="password">Password</label>
      </div>
      
      <button type="submit" class="btn btn-primary w-100 py-3">Sign Up</button>
      
      <div class="text-center mt-4">
         <span class="text-muted small">Already have an account? <a href="login.html" class="text-emerald text-decoration-none fw-bold">Sign In</a></span>
      </div>
    </form>
  </div>
</div>

<script src="./js/register.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
