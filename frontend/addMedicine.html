<!DOCTYPE html>
<html>
<head>
<title>Add Medicine</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="./css/style.css" rel="stylesheet">
</head>

<body class="bg-light">

<div id="navbar"></div>

<div class="container mt-5">

<div class="card shadow-lg p-4 add-card">
<h3 class="text-center mb-3">Add Medicine</h3>

<form id="addMedicineForm">

<input class="form-control mb-3" id="name" placeholder="Medicine Name" required>

<input class="form-control mb-3" id="batch" placeholder="Batch Number" required>

<input type="date" class="form-control mb-3" id="expiry" required>

<input type="number" class="form-control mb-3" id="quantity" placeholder="Quantity" required>

<input class="form-control mb-3" id="category" placeholder="Category" required>

<button class="btn btn-success w-100">Add Medicine</button>

</form>

</div>

</div>

<script src="./js/addMedicine.js"></script>
<script src="./js/navbar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
