<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Add Medicine | MediConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="./css/style.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <div class="bg-blobs"></div>
    <div id="navbar"></div>

    <div class="container py-5 mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card border-0 p-4">
                    <div class="card-body">
                        <h3 class="text-center mb-1 fw-bold text-gradient">Add Medicine</h3>
                        <p class="text-center text-muted mb-4 small">List your surplus medicines to connect them to those in need.</p>

                        <form id="addMedicineForm">
                            <div class="form-floating mb-3">
                                <input type="text" id="name" class="form-control" placeholder="e.g. Paracetamol 500mg" required>
                                <label for="name">Medicine Name</label>
                            </div>

                            <div class="form-floating mb-3">
                                <input type="text" id="batch" class="form-control" placeholder="e.g. B-2024-X" required>
                                <label for="batch">Batch Number</label>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6 mb-3 mb-md-0">
                                    <div class="form-floating">
                                        <input type="date" id="expiry" class="form-control" required>
                                        <label for="expiry">Expiry Date</label>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-floating">
                                        <input type="number" id="quantity" class="form-control" placeholder="Units" required>
                                        <label for="quantity">Quantity (Units)</label>
                                    </div>
                                </div>
                            </div>

                            <div class="form-floating mb-4">
                                <select id="category" class="form-select" required>
                                    <option value="" disabled selected>Select Category</option>
                                    <option value="Tablet">Tablet</option>
                                    <option value="Syrup">Syrup</option>
                                    <option value="Injection">Injection</option>
                                    <option value="Capsule">Capsule</option>
                                    <option value="Ointment">Ointment</option>
                                </select>
                                <label for="category">Category</label>
                            </div>

                            <div class="d-grid gap-2 mt-2">
                                <button type="submit" class="btn btn-primary py-3">Confirm Donation</button>
                                <a href="donorInventory.html" class="btn btn-link text-decoration-none text-muted small mt-2 text-center">Cancel & Back to Inventory</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="./js/addMedicine.js"></script>
    <script src="./js/navbar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
