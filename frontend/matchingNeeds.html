<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Matching Needs | MediConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="./css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <div class="bg-blobs"></div>
    <div id="navbar"></div>

    <div class="container py-5" style="margin-top: 2rem;">
        <div class="row align-items-center mb-4">
            <div class="col-md-8">
                <h2 class="mb-1 fw-bold text-gradient">Matching NGO Needs</h2>
                <p class="text-muted small mb-0">Fulfill urgent medicine requirements from local NGOs instantly.</p>
            </div>
            <div class="col-md-4 text-md-end mt-3 mt-md-0">
                <a href="donorInventory.html" class="btn btn-secondary shadow-sm w-100 w-md-auto"><i class="fas fa-boxes me-2"></i>My Inventory</a>
            </div>
        </div>

        <div class="card border-0 p-1">
            <div class="table-responsive">
                <table class="table align-middle mb-0">
                    <thead>
                        <tr>
                            <th class="px-4">Medicine Name</th>
                            <th class="text-center">Required</th>
                            <th class="text-center">Remaining</th>
                            <th class="text-center">Urgency</th>
                            <th class="px-4 text-end">Action</th>
                        </tr>
                    </thead>
                    <tbody id="matchTable">
                        <!-- Loaded via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="./js/matchingNeeds.js"></script>
    <script src="./js/navbar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
