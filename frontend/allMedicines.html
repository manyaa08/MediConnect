<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>All Available Medicines</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="./css/style.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
<div class="bg-blobs"></div>
<div id="navbar"></div>

<div class="container py-5" style="margin-top: 4rem;">
    <div class="row mb-4 align-items-center">
        <div class="col">
            <h2 class="mb-1 fw-bold text-gradient">Available Medicines</h2>
            <p class="text-muted small">Browse all currently available stock from various donors.</p>
        </div>
    </div>

    <div class="card border-0 shadow-sm overflow-hidden">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light">
                    <tr>
                        <th class="px-4 py-3 text-uppercase small fw-bold text-muted">Medicine</th>
                        <th class="py-3 text-uppercase small fw-bold text-muted">Batch</th>
                        <th class="py-3 text-uppercase small fw-bold text-muted">Expiry</th>
                        <th class="py-3 text-uppercase small fw-bold text-muted">Qty</th>
                        <th class="py-3 text-uppercase small fw-bold text-muted">Category</th>
                        <th class="py-3 text-uppercase small fw-bold text-muted">Donor</th>
                        <th class="px-4 py-3 text-uppercase small fw-bold text-muted text-end">City</th>
                    </tr>
                </thead>
                <tbody id="medicineTable">
                    <!-- Loaded via JS -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="./js/allMedicines.js"></script>
<script src="./js/navbar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
