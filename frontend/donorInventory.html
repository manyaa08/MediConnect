<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Your Inventory | MediConnect</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="./css/style.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
<div class="bg-blobs"></div>
<div id="navbar"></div>

<div class="container py-5" style="margin-top: 2rem;">
    <div class="row align-items-center mb-4">
        <div class="col-md-8">
            <h2 class="mb-1 fw-bold text-gradient">Donor Dashboard</h2>
            <p class="text-muted small mb-0">Monitor your analytics and manage your medicine catalog.</p>
        </div>
        <div class="col-md-4 text-md-end mt-3 mt-md-0">
            <a href="addMedicine.html" class="btn btn-primary shadow-sm w-100 w-md-auto"><i class="fas fa-plus me-2"></i>Add Medicine</a>
        </div>
    </div>

    <!-- Summary Stat Cards -->
    <div class="row g-4 mb-5">
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-icon emerald"><i class="fas fa-box-open"></i></div>
                <div>
                    <h3 class="stat-value" id="statAvailable">0</h3>
                    <p class="stat-label">Available Batches</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-icon purple"><i class="fas fa-exclamation-triangle"></i></div>
                <div>
                    <h3 class="stat-value" id="statExpiring">0</h3>
                    <p class="stat-label">Expiring Soon</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-icon blue"><i class="fas fa-pills"></i></div>
                <div>
                    <h3 class="stat-value" id="statQuantity">0</h3>
                    <p class="stat-label">Total Units Available</p>
                </div>
            </div>
        </div>
    </div>

    <div class="card border-0 p-1">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead>
                    <tr>
                        <th class="px-4">Medicine Name</th>
                        <th>Batch</th>
                        <th>Status</th>
                        <th>Quantity</th>
                        <th class="px-4">Category</th>
                    </tr>
                </thead>
                <tbody id="inventoryTable">
                    <!-- Loaded via JS -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="./js/donorInventory.js"></script>
<script src="./js/navbar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
