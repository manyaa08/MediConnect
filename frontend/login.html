<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MediConnect Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="./css/style.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
<div class="bg-blobs"></div>

<div class="auth-wrapper">
  <div class="card auth-card">
    <div class="text-center mb-5">
      <h2 class="mb-2 fw-bold text-gradient">MediConnect</h2>
      <p class="text-muted">Welcome back! Please sign in.</p>
    </div>

    <form id="loginForm">
      <div class="form-floating mb-4">
        <input type="email" id="email" class="form-control" placeholder="user@example.com" required>
        <label for="email">Email Address</label>
      </div>
      
      <div class="form-floating mb-5">
        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        <label for="password">Password</label>
      </div>
      
      <button type="submit" class="btn btn-primary w-100 py-3">Sign In</button>
      
      <div class="text-center mt-4">
         <span class="text-muted small">Don't have an account? <a href="register.html" class="text-emerald text-decoration-none fw-bold">Sign Up</a></span>
      </div>
    </form>
  </div>
</div>

<script src="./js/login.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
