<!DOCTYPE html>
<html>
<head>
<title>MediConnect Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="./css/style.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
<div class="card mx-auto shadow" style="max-width:400px;">
<div class="card-body">

<h3 class="text-center">MediConnect Login</h3>

<form id="loginForm">
<input type="email" id="email" class="form-control mt-3" placeholder="Email" required>
<input type="password" id="password" class="form-control mt-3" placeholder="Password" required>
<button class="btn btn-primary w-100 mt-3">Login</button>
</form>

</div>
</div>
</div>

<script src="./js/login.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
